<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Smart Empire Hub</title>
    <meta name="description" content="Get in touch with Smart Empire Hub. We're here to help!">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/contact.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="/" class="logo">⚡ Smart Empire Hub</a>
            <nav class="nav">
                <a href="/">Home</a>
                <a href="/categories/">Categories</a>
                <a href="/about/">About</a>
                <a href="/contact/" class="active">Contact</a>
            </nav>
        </div>
    </header>

    <main class="contact-page">
        <div class="container">
            <div class="contact-header">
                <h1>Get in Touch</h1>
                <p>Have a question or suggestion? We'd love to hear from you.</p>
            </div>

            <div class="contact-content">
                <div class="contact-form">
                    <form id="contact-form">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="subject">Subject</label>
                            <input type="text" id="subject" name="subject" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="6" required></textarea>
                        </div>
                        <button type="submit" class="btn-submit">Send Message</button>
                    </form>
                </div>

                <div class="contact-info">
                    <h3>Other Ways to Reach Us</h3>
                    <div class="info-item">
                        <strong>Email:</strong>
                        <a href="mailto:hello@smartempirehub.com">hello@smartempirehub.com</a>
                    </div>
                    <div class="info-item">
                        <strong>Response Time:</strong>
                        <p>We typically respond within 24-48 hours</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Smart Empire Hub. All rights reserved.</p>
        </div>
    </footer>

    <script src="/assets/js/contact.js"></script>
</body>
</html>
