<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found - Smart Empire Hub</title>
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/404.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="/" class="logo">⚡ Smart Empire Hub</a>
            <nav class="nav">
                <a href="/">Home</a>
                <a href="/categories/">Categories</a>
            </nav>
        </div>
    </header>

    <main class="error-page">
        <div class="container">
            <div class="error-content">
                <h1 class="error-code">404</h1>
                <h2 class="error-title">Page Not Found</h2>
                <p class="error-message">Oops! The page you're looking for doesn't exist or has been moved.</p>
                <div class="error-actions">
                    <a href="/" class="btn-primary">Go Home</a>
                    <a href="/categories/" class="btn-secondary">Browse Tools</a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
