<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Compressor - Smart Empire Hub</title>
<link rel="stylesheet" href="/assets/css/main.css">
<link rel="stylesheet" href="/assets/css/tool.css">
</head>
<body>
<header class="header"><div class="container"><a href="/" class="logo">⚡ Smart Empire Hub</a></div></header>
<main class="tool-container">
<div class="tool-header"><h1>Image Compressor</h1><p>Compress images without losing quality</p></div>
<div class="tool-interface">
<div class="upload-area" style="border:2px dashed var(--border-color);border-radius:12px;padding:40px;text-align:center;cursor:pointer;" onclick="document.getElementById('file-input').click()"><i class="fas fa-cloud-upload-alt" style="font-size:48px;color:var(--accent-yellow);margin-bottom:16px;"></i><p>Click or drag image here</p><input type="file" id="file-input" accept="image/*" style="display:none;"></div>
<canvas id="canvas" style="display:none;"></canvas>
<div id="compress-result" style="display:none;margin-top:20px;"><p>Original: <span id="original-size"></span></p><p>Compressed: <span id="compressed-size"></span></p><a id="download-compressed" class="btn-action" style="display:inline-block;margin-top:10px;">Download</a></div>
</div>
</main>
<footer class="footer"><div class="container"><p>&copy; 2026 Smart Empire Hub. All rights reserved.</p></div></footer>
<script src="/tools/image-compressor/app.js"></script>
</body>
</html>
