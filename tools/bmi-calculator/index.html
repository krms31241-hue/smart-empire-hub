<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator - Smart Empire Hub</title>
<link rel="stylesheet" href="/assets/css/main.css">
<link rel="stylesheet" href="/assets/css/tool.css">
</head>
<body>
<header class="header"><div class="container"><a href="/" class="logo">⚡ Smart Empire Hub</a></div></header>
<main class="tool-container">
<div class="tool-header"><h1>BMI Calculator</h1><p>Calculate your Body Mass Index</p></div>
<div class="tool-interface">
<div class="form-group"><label>Height (cm)</label><input type="number" id="height" placeholder="170"></div>
<div class="form-group"><label>Weight (kg)</label><input type="number" id="weight" placeholder="70"></div>
<button id="calculate-btn" class="btn-generate">Calculate BMI</button>
<div id="bmi-result" style="margin-top:20px;text-align:center;display:none;"><div style="font-size:48px;font-weight:900;color:var(--accent-yellow)" id="bmi-value"></div><div id="bmi-category"></div></div>
</div>
</main>
<footer class="footer"><div class="container"><p>&copy; 2026 Smart Empire Hub. All rights reserved.</p></div></footer>
<script src="/tools/bmi-calculator/app.js"></script>
</body>
</html>
