<header class="header"><div class="container"><a href="/" class="logo">⚡ Smart Empire Hub</a></div></header>
<main class="tool-container">

<div class="form-group"><label>Type</label><select id="lorem-type"><option value="paragraphs">Paragraphs</option><option value="words">Words</option><option value="bytes">Bytes</option></select></div>

<button id="generate-lorem" class="btn-generate">Generate</button>
<textarea id="lorem-output" rows="8" readonly style="margin-top:20px;"></textarea>
<button id="copy-lorem" class="btn-action" style="margin-top:10px;">Copy</button>
</div>
