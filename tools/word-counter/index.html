<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Counter - Smart Empire Hub</title>
<link rel="stylesheet" href="/assets/css/main.css">
<link rel="stylesheet" href="/assets/css/tool.css">
</head>
<body>
<header class="header"><div class="container"><a href="/" class="logo">⚡ Smart Empire Hub</a></div></header>
<main class="tool-container">
<div class="tool-header"><h1>Word Counter</h1><p>Count words, characters, and lines instantly</p></div>
<div class="tool-interface"><textarea id="text-input" rows="10" placeholder="Type or paste your text here..."></textarea>
<div class="stats-grid" id="stats"><div class="stat"><div class="stat-num" id="word-count">0</div><div class="stat-label">Words</div></div><div class="stat"><div class="stat-num" id="char-count">0</div><div class="stat-label">Characters</div></div><div class="stat"><div class="stat-num" id="line-count">0</div><div class="stat-label">Lines</div></div><div class="stat"><div class="stat-num" id="sentence-count">0</div><div class="stat-label">Sentences</div></div></div>
</div>
</main>
<footer class="footer"><div class="container"><p>&copy; 2026 Smart Empire Hub. All rights reserved.</p></div></footer>
<script src="/tools/word-counter/app.js"></script>
</body>
</html>
