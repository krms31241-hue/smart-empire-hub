<!-- Primary Meta Tags -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} - Smart Empire Hub</title>
<meta name="title" content="{{TITLE}}">
<meta name="description" content="{{DESCRIPTION}}">
<meta name="keywords" content="{{KEYWORDS}}">
<meta name="author" content="Smart Empire Hub">
<meta name="robots" content="index, follow">
<link rel="canonical" href="{{CANONICAL_URL}}">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website">
<meta property="og:url" content="{{OG_URL}}">
<meta property="og:title" content="{{OG_TITLE}}">
<meta property="og:description" content="{{OG_DESCRIPTION}}">
<meta property="og:image" content="{{OG_IMAGE}}">
<meta property="og:site_name" content="Smart Empire Hub">
<meta property="og:locale" content="en_US">

<!-- Twitter -->
<meta property="twitter:card" content="summary_large_image">
<meta property="twitter:url" content="{{TWITTER_URL}}">
<meta property="twitter:title" content="{{TWITTER_TITLE}}">
<meta property="twitter:description" content="{{TWITTER_DESCRIPTION}}">
<meta property="twitter:image" content="{{TWITTER_IMAGE}}">

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">

<!-- Theme Color -->
<meta name="theme-color" content="#0f111a">
<meta name="msapplication-TileColor" content="#0f111a">
